<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --color-principal: #93d21e;
            --color-secundario: #ffdd00;
            --color-terciario: #00fafa;
            --color-fondo: #f0f0f0;
            --color-texto: #333;
        }

        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            padding: 16px;
            justify-content: center;
            border: 3px solid var(--color-texto);
            border-radius: 1rem;
            margin: 1rem;
        }

        .card {
            width: 200px;
            margin: 0;
            background-color: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
        }

        .card img {
            display: block;
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card figcaption {
            text-align: center;
            padding: 12px 8px;
            font-weight: 600;
            color: var(--color-texto);
            background-color: var(--color-terciario);
        }
        body {
            background-color: var(--color-fondo);
            color: var(--color-texto);
            font-family: Arial, sans-serif;
        }

        .link-dom {
            color: var(--color-principal);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
        }

        .link-dom:hover {
            background-color: var(--color-secundario);
            color: #fff;
        }

        .rotate {
            transform: rotate(30deg);
        }

       

    </style>

<body>
